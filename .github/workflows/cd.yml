name: CD — Build & Push Docker

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Image d'entraînement ──────────────────────────────
      - name: Build & push training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.train
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/train:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/train:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Image d'inférence (API) ───────────────────────────
      - name: Build & push inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.inference
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Smoke test : l'image API démarre et /health répond ──
  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run API container (local model)
        run: |
          docker run -d --name api-smoke \
            -p 8000:8000 \
            -e USE_LOCAL_MODEL=true \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "API did not become healthy in time"
          docker logs api-smoke
          exit 1

      - name: Verify /health response
        run: |
          STATUS=$(curl -sf http://localhost:8000/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Health status: $STATUS"
          [[ "$STATUS" == "ok" || "$STATUS" == "degraded" ]]

      - name: Cleanup
        if: always()
        run: docker rm -f api-smoke || true
